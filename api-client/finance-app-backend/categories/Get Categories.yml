info:
  name: Get Categories
  type: http
  seq: 1
  tags:
    - categories

http:
  method: GET
  url: "{{finance_app_backend}}/api/categories/"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/categories/"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "name": "",
              "icon": "",
              "color": "",
              "id": ""
            }
          ]
