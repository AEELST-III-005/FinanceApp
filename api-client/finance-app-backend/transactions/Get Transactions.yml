info:
  name: Get Transactions
  type: http
  seq: 1
  tags:
    - transactions

http:
  method: GET
  url: :id{{finance_app_backend}}/api/transactions/
  params:
    - name: id{{finance_app_backend}}
      value: ""
      type: path
    - name: start_date
      value: ""
      type: query
      disabled: true
    - name: end_date
      value: ""
      type: query
      disabled: true
    - name: category_id
      value: ""
      type: query
      disabled: true
    - name: transaction_type
      value: ""
      type: query
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/transactions/"
      method: GET
      params:
        - name: start_date
          value: ""
          type: query
          disabled: true
        - name: end_date
          value: ""
          type: query
          disabled: true
        - name: category_id
          value: ""
          type: query
          disabled: true
        - name: transaction_type
          value: ""
          type: query
          disabled: true
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "title": "",
              "description": "",
              "amount": "",
              "transaction_date": "",
              "transaction_type": "",
              "category_id": "",
              "id": ""
            }
          ]
  - name: 422 Response
